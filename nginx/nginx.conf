# ─────────────────────────────────────────────────────────────────────────────
# /etc/nginx/nginx.conf  (replace the default on your host or mount via Docker)
# Dharmasthala Events – Production Nginx Configuration
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 4096;
    server_tokens      off;           # Don't reveal Nginx version
    client_max_body_size 10m;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API zone: 20 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;
    # Contact form: 5 req/min per IP (anti-spam)
    limit_req_zone $binary_remote_addr zone=contact_zone:10m rate=5r/m;
    # Newsletter: 10 req/min per IP
    limit_req_zone $binary_remote_addr zone=newsletter_zone:10m rate=10r/m;
    # Auth (backup): 10 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;
    limit_conn conn_zone 30;

    # ── SSL shared settings ───────────────────────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  on;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache          shared:SSL:50m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout           5s;

    include /etc/nginx/conf.d/*.conf;
}
