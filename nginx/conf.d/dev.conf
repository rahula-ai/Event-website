# nginx/conf.d/dev.conf
# ─────────────────────────────────────────────────────────────────────────────
# Development-only Nginx config.
# Mounted over dharmasthala.conf by docker-compose.dev.yml so that local dev
# uses plain HTTP with no TLS, no rate limiting, and no security headers.
#
# Accessed at: http://localhost:8080  (via the nginx container)
# Backend direct: http://localhost:8000
# Frontend direct: http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    # ── API → FastAPI backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Frontend → Nginx static server ────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;

        # SPA fallback: unknown paths → index.html
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend:80/index.html;
    }
}
