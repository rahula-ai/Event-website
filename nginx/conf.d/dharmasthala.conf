# ─────────────────────────────────────────────────────────────────────────────
# /etc/nginx/conf.d/dharmasthala.conf
# Replace YOUR_DOMAIN with your actual domain (e.g. dharmasthala.org.in)
# ─────────────────────────────────────────────────────────────────────────────

# Upstream – FastAPI backend (Docker service name or 127.0.0.1 if bare-metal)
upstream api_backend {
    server backend:8000;          # Docker Compose service name
    # server 127.0.0.1:8000;     # Bare-metal / systemd
    keepalive 32;
}

# Upstream – React frontend (Docker service name or 127.0.0.1)
upstream frontend_app {
    server frontend:80;           # Docker Compose service name
    # server 127.0.0.1:3000;     # Bare-metal / static serve
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── TLS certificates (Certbot / Let's Encrypt) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_dhparam         /etc/nginx/ssl/dhparam.pem;    # generate: openssl dhparam -out dhparam.pem 4096

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header X-XSS-Protection           "1; mode=block"                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://fonts.googleapis.com; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: https://images.unsplash.com; \
         connect-src 'self'; \
         frame-ancestors 'none';" always;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=40 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering    on;

        # CORS is handled by FastAPI – don't add duplicate headers here
    }

    # ── Contact endpoint – stricter rate limit ────────────────────────────────
    location /api/contact {
        limit_req zone=contact_zone burst=3 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Newsletter endpoint ───────────────────────────────────────────────────
    location /api/newsletter {
        limit_req zone=newsletter_zone burst=5 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints (backup module) ────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────────
    location /health {
        proxy_pass http://api_backend;
        access_log off;
    }

    # ── Block access to admin export endpoints from public ────────────────────
    # These are protected by X-API-Key but we add IP allow-list as extra layer
    # Uncomment and set your server's management IP
    # location ~ ^/api/(contact|newsletter|register)$ {
    #     allow 203.0.113.10;   # Your management IP
    #     deny  all;
    #     proxy_pass http://api_backend;
    # }

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA: always serve index.html for unknown paths
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend_app/index.html;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"Too many requests. Please slow down.","retry_after":60}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        internal;
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable. Please try again shortly."}';
    }
}
