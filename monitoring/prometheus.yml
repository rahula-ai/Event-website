global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    app: dharmasthala-events

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: fastapi_backend
    static_configs:
      - targets: [backend:8000]
    metrics_path: /metrics   # Add prometheus-fastapi-instrumentator to backend if needed

  - job_name: node
    static_configs:
      - targets: [localhost:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: nginx
    static_configs:
      - targets: [nginx:9113]   # nginx-prometheus-exporter (optional sidecar)
