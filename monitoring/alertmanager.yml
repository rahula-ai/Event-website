global:
  smtp_smarthost:    "smtp.gmail.com:587"
  smtp_from:         "alerts@dharmasthala.org.in"
  smtp_auth_username: "alerts@dharmasthala.org.in"
  smtp_auth_password: "YOUR_SMTP_APP_PASSWORD"    # ← Set this
  smtp_require_tls:  true

route:
  receiver: email_alerts
  group_by: [alertname, severity]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: email_critical
      repeat_interval: 1h

receivers:
  - name: email_alerts
    email_configs:
      - to: "admin@dharmasthala.org.in"
        send_resolved: true
        headers:
          Subject: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} – Dharmasthala Events"

  - name: email_critical
    email_configs:
      - to: "admin@dharmasthala.org.in"
        send_resolved: true
        headers:
          Subject: "🚨 CRITICAL [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]
